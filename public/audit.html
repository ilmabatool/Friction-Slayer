<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Executive Audit &middot; Qaseem.pk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #050505;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      opacity: 0;
      animation: dashIn 0.55s ease 0.05s forwards;
    }
    @keyframes dashIn { to { opacity: 1; } }

    /* ── TOP NAV ── */
    .top-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 50px;
      background: rgba(5,5,5,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.055);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.75rem;
    }
    .nav-brand {
      font-size: 0.6rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(255,255,255,0.25); font-weight: 700;
    }
    .nav-center {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 0.58rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.13);
    }
    .nav-badge {
      font-size: 0.55rem; letter-spacing: 0.13em; text-transform: uppercase;
      background: rgba(239,68,68,0.1); color: rgba(239,68,68,0.7);
      border: 1px solid rgba(239,68,68,0.2);
      padding: 0.22rem 0.65rem; border-radius: 4px;
    }

    /* ── MAIN ── */
    .main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 74px 1.75rem 5rem;
    }

    /* ── EXEC HEADER ── */
    .exec-header {
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.055);
      margin-bottom: 1.75rem;
    }
    .exec-url {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.16); margin-bottom: 1rem;
    }
    .exec-url span { color: rgba(255,255,255,0.35); }
    .exec-h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 900; line-height: 1.1; letter-spacing: -0.025em; margin-bottom: 1.1rem;
    }
    .exec-h1 .red-grad {
      background: linear-gradient(135deg, #ff3030, #dc2626);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .risk-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(239,68,68,0.1); color: #ef4444;
      border: 1px solid rgba(239,68,68,0.25);
      font-size: 0.6rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.35rem 0.85rem; border-radius: 5px;
    }
    .risk-pulse {
      width: 6px; height: 6px; border-radius: 50%; background: #ef4444;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0   rgba(239,68,68,0.6); }
      50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0);   }
    }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; overflow: hidden;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) { .kpi-grid { grid-template-columns: 1fr; } }
    .kpi-card {
      background: #050505; padding: 2rem 1.75rem;
      display: flex; flex-direction: column;
    }
    .kpi-card.primary { background: #070707; }
    .kpi-label {
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.2); margin-bottom: 1rem;
    }
    .kpi-value {
      font-size: clamp(2.8rem, 7vw, 4.2rem);
      font-weight: 900; line-height: 1; letter-spacing: -0.03em;
      color: #ef4444; text-shadow: 0 0 60px rgba(239,68,68,0.32);
    }
    .kpi-value.sm { font-size: clamp(2rem, 5vw, 2.9rem); text-shadow: 0 0 40px rgba(239,68,68,0.22); }
    .kpi-sub { font-size: 0.68rem; color: rgba(255,255,255,0.14); margin-top: 0.6rem; letter-spacing: 0.04em; }
    .kpi-tagline { font-size: 0.8rem; color: rgba(255,255,255,0.32); margin-top: 0.65rem; line-height: 1.55; }
    .kpi-tagline strong { color: rgba(255,255,255,0.6); }

    /* ── ANALYSIS GRID ── */
    .analysis-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 1px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; overflow: hidden;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 680px) { .analysis-grid { grid-template-columns: 1fr; } }
    .a-panel { background: #050505; padding: 1.75rem; }
    .a-panel.alt { background: #060606; }
    .panel-label {
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); margin-bottom: 1.25rem;
    }

    /* Hick's Law panel */
    .score-row { display: flex; align-items: flex-end; gap: 0.5rem; margin-bottom: 1.2rem; }
    .score-num { font-size: 4rem; font-weight: 900; line-height: 1; letter-spacing: -0.04em; }
    .score-denom { font-size: 1rem; color: rgba(255,255,255,0.2); margin-bottom: 0.45rem; }
    .score-sev {
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase;
      padding: 0.25rem 0.65rem; border-radius: 4px; margin-bottom: 0.45rem; margin-left: auto; align-self: flex-start;
    }
    .score-track {
      height: 4px; background: rgba(255,255,255,0.06);
      border-radius: 4px; overflow: hidden; margin-bottom: 1rem;
    }
    .score-fill { height: 100%; border-radius: 4px; transition: width 1.4s cubic-bezier(0.4,0,0.2,1); }
    .friction-verdict { font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.65); margin-bottom: 0.5rem; }
    .friction-msg { font-size: 0.78rem; color: rgba(255,255,255,0.28); line-height: 1.7; }

    /* Revenue model panel */
    .rev-row {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.045);
    }
    .rev-row:last-child { border-bottom: none; }
    .rev-icon {
      font-size: 0.72rem; background: rgba(255,255,255,0.04);
      border-radius: 6px; padding: 0.35rem 0.45rem; flex-shrink: 0; margin-top: 0.1rem;
    }
    .rev-lbl { font-size: 0.78rem; font-weight: 700; color: rgba(255,255,255,0.58); margin-bottom: 0.2rem; }
    .rev-detail { font-size: 0.72rem; color: rgba(255,255,255,0.24); line-height: 1.65; }

    /* ── CWV BADGE ROW ── */
    .cwv-row {
      display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.1rem;
    }
    .cwv-badge {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 0.6rem 1rem; min-width: 90px;
    }
    .cwv-badge.bad  { border-color: rgba(239,68,68,0.3);  background: rgba(239,68,68,0.05); }
    .cwv-badge.good { border-color: rgba(34,197,94,0.3);  background: rgba(34,197,94,0.05); }
    .cwv-key   { font-size: 0.52rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.25); margin-bottom: 0.3rem; }
    .cwv-val   { font-size: 1.1rem; font-weight: 900; letter-spacing: -0.02em; }
    .cwv-val.red  { color: #ef4444; }
    .cwv-val.green { color: #22c55e; }

    /* ── ACTION PLAN ── */
    .action-wrap {
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; overflow: hidden; margin-bottom: 1.5rem;
    }
    .action-head {
      background: #070707; padding: 1.25rem 1.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.055);
    }
    .section-label {
      font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.18); margin-bottom: 0.6rem;
    }
    .action-desc { font-size: 0.84rem; color: rgba(255,255,255,0.3); line-height: 1.65; }
    .action-body { padding: 1.5rem 1.75rem; }
    .price-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.85rem 1rem; border-radius: 8px; margin-bottom: 0.5rem;
    }
    .price-lbl { font-size: 0.85rem; color: rgba(255,255,255,0.32); }
    .price-val { font-size: 0.95rem; font-weight: 700; color: rgba(255,255,255,0.18); text-decoration: line-through; }
    .price-row.sub .price-lbl { color: rgba(255,255,255,0.28); }
    .price-row.sub .price-val { color: rgba(239,68,68,0.45); text-decoration: none; font-size: 0.9rem; }
    .divider { height: 1px; background: rgba(255,255,255,0.045); margin: 0.75rem 0; }
    .price-row.total {
      background: rgba(34,211,238,0.05);
      border: 1px solid rgba(34,211,238,0.18);
      margin-top: 0.75rem; margin-bottom: 0;
    }
    .price-row.total .price-lbl { color: #fff; font-weight: 700; font-size: 0.9rem; }
    .price-row.total .price-val { color: #22d3ee; font-size: 1.35rem; text-decoration: none; }

    /* ── CTA ── */
    .cta-wrap {
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 14px; overflow: hidden;
    }
    .cta-inner { padding: 2rem 1.75rem 1.5rem; }
    .cta-btn {
      display: block; width: 100%;
      padding: 1.1rem 1.5rem; border-radius: 10px;
      background: #22d3ee; color: #000;
      font-weight: 900; font-size: 0.88rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      text-align: center; text-decoration: none;
      box-shadow: 0 0 50px rgba(34,211,238,0.45), 0 0 100px rgba(34,211,238,0.15);
      transition: background 0.2s, box-shadow 0.2s;
      margin-bottom: 0.75rem;
    }
    .cta-btn:hover {
      background: #67e8f9;
      box-shadow: 0 0 70px rgba(34,211,238,0.6), 0 0 140px rgba(34,211,238,0.22);
    }
    .cta-sub {
      text-align: center; font-size: 0.62rem;
      color: rgba(255,255,255,0.13); letter-spacing: 0.06em; text-transform: uppercase;
    }
    .cd-footer {
      background: #070707; padding: 1rem 1.75rem;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: space-between;
    }
    .cd-lbl { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.18); }
    .cd-timer {
      font-size: 1.25rem; font-weight: 900; color: #f87171;
      letter-spacing: 0.1em; font-variant-numeric: tabular-nums;
    }

    /* ── FALLBACK STATE ── */
    .no-data {
      text-align: center; padding: 4rem 1rem;
      color: rgba(255,255,255,0.2); font-size: 0.9rem;
    }
    .no-data a { color: #22d3ee; text-decoration: none; }
  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="top-nav">
    <span class="nav-brand">Qaseem.pk</span>
    <span class="nav-center">Executive Audit &mdash; Confidential</span>
    <span class="nav-badge" id="nav-risk-badge">Risk Level: Critical</span>
  </nav>

  <div class="main" id="audit-root">
    <!-- Populated dynamically from sessionStorage by the script below -->
    <div class="no-data" id="no-data-msg" style="display:none;">
      No audit data found. <a href="/">Run a scan first &rarr;</a>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // ── Read audit data from sessionStorage ──────────────────────────────────
    var raw = sessionStorage.getItem('auditData');
    if (!raw) {
      document.getElementById('no-data-msg').style.display = 'block';
      return;
    }

    var d;
    try { d = JSON.parse(raw); } catch (e) {
      document.getElementById('no-data-msg').style.display = 'block';
      return;
    }

    // ── Derived values ────────────────────────────────────────────────────────
    var annualLeak  = d.annualLeak      || 0;
    var monthly     = d.monthlyExposure || Math.round(annualLeak / 12);
    var daily       = d.dailyLoss       || Math.round(annualLeak / 365);
    var siteUrl     = d.siteUrl         || '';
    var lcp         = typeof d.lcp === 'number' ? d.lcp   : null;
    var inp         = typeof d.inp === 'number' ? d.inp   : null;
    var hicks       = d.hicksData       || {};
    var fScore      = d.hicksScore      || (hicks.verdict === 'Decision Paralysis' ? 87 : 22);
    var fVerdict    = d.hicksVerdict    || hicks.verdict  || 'Unknown';
    var fMsg        = d.hicksMessage    || hicks.message  || '';
    var isParalysis = fScore >= 50;
    var fColor      = isParalysis ? '#ef4444' : '#22c55e';
    var fBg         = isParalysis ? 'rgba(239,68,68,0.08)'  : 'rgba(34,197,94,0.08)';
    var fBorder     = isParalysis ? 'rgba(239,68,68,0.25)'  : 'rgba(34,197,94,0.25)';
    var fSeverity   = isParalysis ? 'CRITICAL' : 'LOW RISK';
    var fLabel      = isParalysis
      ? "Hick\u2019s Law Violation \u2014 Decision Paralysis"
      : "Navigation Architecture \u2014 Within Threshold";

    // Sanitize URL for display
    var escUrl = String(siteUrl)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    // ── CWV badges ────────────────────────────────────────────────────────────
    var lcpBadge = '';
    var inpBadge = '';
    if (lcp !== null) {
      var lcpBad  = lcp > 2.5;
      var lcpClass = lcpBad ? 'bad' : 'good';
      var lcpVClass = lcpBad ? 'red' : 'green';
      lcpBadge = '<div class="cwv-badge ' + lcpClass + '">' +
        '<span class="cwv-key">LCP</span>' +
        '<span class="cwv-val ' + lcpVClass + '">' + lcp.toFixed(2) + 's</span>' +
        '</div>';
    }
    if (inp !== null) {
      var inpBad   = inp > 200;
      var inpClass = inpBad ? 'bad' : 'good';
      var inpVClass = inpBad ? 'red' : 'green';
      inpBadge = '<div class="cwv-badge ' + inpClass + '">' +
        '<span class="cwv-key">INP</span>' +
        '<span class="cwv-val ' + inpVClass + '">' + Math.round(inp) + 'ms</span>' +
        '</div>';
    }
    var cwvRow = (lcpBadge || inpBadge)
      ? '<div class="cwv-row">' + lcpBadge + inpBadge + '</div>'
      : '';

    // Revenue model detail
    var leakReasons = [];
    if (lcp !== null && lcp > 2.5)   leakReasons.push('LCP ' + lcp.toFixed(2) + 's exceeds 2.5s threshold (&minus;15%)');
    if (inp !== null && inp > 200)    leakReasons.push('INP ' + Math.round(inp) + 'ms exceeds 200ms threshold (&minus;10%)');
    var lossMsg = leakReasons.length
      ? 'Your site is bleeding an estimated $' + monthly.toLocaleString() + '/month ($' + daily.toLocaleString() + '/day) because: ' + leakReasons.join(' + ') + '. Every day without a fix, another $' + daily.toLocaleString() + ' walks out the door.'
      : 'Performance penalties detected. Each friction point compounds conversion abandonment at the critical decision moment.';

    // ── Build the page HTML ───────────────────────────────────────────────────
    var html = '<section class="exec-header">' +
      '<p class="exec-url">Site Analyzed: <span>' + escUrl + '</span></p>' +
      '<h1 class="exec-h1">Executive Summary:<br/><span class="red-grad">Revenue Leak Confirmed.</span></h1>' +
      '<div class="risk-badge"><span class="risk-pulse"></span> Risk Level: Critical</div>' +
      '</section>' +

      // KPI GRID
      '<div class="kpi-grid">' +
        '<div class="kpi-card primary">' +
          '<p class="kpi-label">Annual Revenue Leak</p>' +
          '<p class="kpi-value" id="kpi-annual">$' + annualLeak.toLocaleString() + '</p>' +
          '<p class="kpi-tagline">That is <strong>$' + daily.toLocaleString() + '</strong> walking out the door every single day.</p>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<p class="kpi-label">Monthly Exposure</p>' +
          '<p class="kpi-value sm" id="kpi-monthly">$' + monthly.toLocaleString() + '</p>' +
          '<p class="kpi-sub">per 30 days</p>' +
        '</div>' +
        '<div class="kpi-card">' +
          '<p class="kpi-label">Daily Loss</p>' +
          '<p class="kpi-value sm" id="kpi-daily">$' + daily.toLocaleString() + '</p>' +
          '<p class="kpi-sub">every day this goes unfixed</p>' +
        '</div>' +
      '</div>' +

      // ANALYSIS GRID
      '<div class="analysis-grid">' +
        '<div class="a-panel">' +
          '<p class="panel-label">Hick&rsquo;s Law Analysis &mdash; Friction Load</p>' +
          '<div class="score-row">' +
            '<p class="score-num" id="score-num" style="color:' + fColor + ';text-shadow:0 0 55px ' + fColor + '88;">' + fScore + '</p>' +
            '<p class="score-denom">/ 100</p>' +
            '<span class="score-sev" style="background:' + fBg + ';color:' + fColor + ';border:1px solid ' + fBorder + ';">' + fSeverity + '</span>' +
          '</div>' +
          '<div class="score-track">' +
            '<div class="score-fill" id="score-bar" style="width:0%;background:' + fColor + ';box-shadow:0 0 10px ' + fColor + '99;"></div>' +
          '</div>' +
          '<p class="friction-verdict">' + fLabel + '</p>' +
          '<p class="friction-msg">' + fMsg + '</p>' +
          cwvRow +
        '</div>' +
        '<div class="a-panel alt">' +
          '<p class="panel-label">Revenue Model &mdash; Exposure Breakdown</p>' +
          '<div class="rev-row"><div class="rev-icon">📉</div><div>' +
            '<p class="rev-lbl">Performance Tax</p>' +
            '<p class="rev-detail">LCP &gt; 2.5s adds a 15% revenue penalty per Google research. Every second of load delay compounds abandonment.</p>' +
          '</div></div>' +
          '<div class="rev-row"><div class="rev-icon">🧠</div><div>' +
            '<p class="rev-lbl">Cognitive Overload</p>' +
            '<p class="rev-detail">INP &gt; 200ms creates a 10% revenue drag. Sluggish interactions break decision momentum at the critical moment.</p>' +
          '</div></div>' +
          '<div class="rev-row"><div class="rev-icon">⚠️</div><div>' +
            '<p class="rev-lbl">Compounding Exposure</p>' +
            '<p class="rev-detail" id="loss-msg">' + lossMsg + '</p>' +
          '</div></div>' +
        '</div>' +
      '</div>' +

      // ACTION PLAN
      '<div class="action-wrap">' +
        '<div class="action-head">' +
          '<p class="section-label">Action Plan &mdash; Recommended Resolution</p>' +
          '<p class="action-desc">We have identified the critical friction points. Below is the path to stopping the revenue bleed — and exactly what it costs you.</p>' +
        '</div>' +
        '<div class="action-body">' +
          '<div class="price-row"><span class="price-lbl">Professional Agency Audit Fee</span><span class="price-val">$2,000</span></div>' +
          '<div class="price-row sub"><span class="price-lbl">Agency Partner Subsidy</span><span class="price-val">&minus; $2,000</span></div>' +
          '<div class="divider"></div>' +
          '<div class="price-row total"><span class="price-lbl">Your Total Today</span><span class="price-val">$0</span></div>' +
        '</div>' +
      '</div>' +

      // CTA + COUNTDOWN
      '<div class="cta-wrap">' +
        '<div class="cta-inner">' +
          '<a href="mailto:hello@qaseem.pk?subject=Execute%20My%20Free%205-Minute%20Friction%20Fix&body=I%20ran%20the%20revenue%20audit%20and%20want%20to%20execute%20the%20free%205-minute%20friction%20fix." class="cta-btn">Execute 5-Minute Friction Fix &rarr;</a>' +
          '<p class="cta-sub">No commitment &nbsp;&middot;&nbsp; No sales call &nbsp;&middot;&nbsp; One real fix delivered in 5 minutes</p>' +
        '</div>' +
        '<div class="cd-footer">' +
          '<span class="cd-lbl">Offer expires in</span>' +
          '<span class="cd-timer" id="offer-countdown">48:00:00</span>' +
        '</div>' +
      '</div>';

    document.getElementById('audit-root').innerHTML = html;

    // ── Animate score bar ─────────────────────────────────────────────────────
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        var bar = document.getElementById('score-bar');
        if (bar) bar.style.width = fScore + '%';
      });
    });

    // ── 48-hour countdown ─────────────────────────────────────────────────────
    var OFFER_KEY = 'offerStart_' + btoa(siteUrl).slice(0, 12);
    var startTs   = parseInt(sessionStorage.getItem(OFFER_KEY) || '0', 10);
    if (!startTs) {
      startTs = Date.now();
      sessionStorage.setItem(OFFER_KEY, String(startTs));
    }
    var FORTY_EIGHT_H = 48 * 60 * 60 * 1000;

    function tick() {
      var remaining = Math.max(0, FORTY_EIGHT_H - (Date.now() - startTs));
      var h = Math.floor(remaining / 3_600_000);
      var m = Math.floor((remaining % 3_600_000) / 60_000);
      var s = Math.floor((remaining % 60_000) / 1_000);
      var pad = function (n) { return String(n).padStart(2, '0'); };
      var el  = document.getElementById('offer-countdown');
      if (el) el.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
      if (remaining > 0) setTimeout(tick, 1_000);
    }
    tick();
  }());
  </script>

</body>
</html>
